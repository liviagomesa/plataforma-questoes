services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: questoes
      POSTGRES_USER: questoes
      POSTGRES_PASSWORD: questoes
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questoes"]
      interval: 5s
      timeout: 5s
      retries: 5

  back:
    build: ./back
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/questoes
      SPRING_DATASOURCE_USERNAME: questoes
      SPRING_DATASOURCE_PASSWORD: questoes
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  front:
    build: ./front
    ports:
      - "4200:80"
    depends_on:
      - back

volumes:
  pgdata:
